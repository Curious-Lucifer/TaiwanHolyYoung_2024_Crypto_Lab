{% extends "base.html" %}

{% block head %}
<link rel="stylesheet" href="/static/style/index.css">
{% endblock %}

{% block active_encoding %}active{% endblock %}

{% block body %}
<div class="container-fluid d-flex justify-content-start gap-50 m-3 p-3">
  <div class="interactive-container width-350">
    <div class="interactive-block">
      <h2>String</h2>
      <textarea id="hex-string"></textarea>
    </div>

    <div class="switch-container">
      <img src="/static/img/switch.png" width="24">
    </div>

    <div class="interactive-block">
      <h2>Hex String</h2>
      <textarea id="hex-hexstring"></textarea>
    </div>
  </div>

  <div class="interactive-container width-350">
    <div class="interactive-block">
      <h2>String</h2>
      <textarea id="base64-string"></textarea>
    </div>

    <div class="switch-container">
      <img src="/static/img/switch.png" width="24">
    </div>

    <div class="interactive-block">
      <h2>Base64 String</h2>
      <textarea id="base64-base64string"></textarea>
    </div>
  </div>
</div>
{% endblock %}

{% block script %}
<script src="/static/js/utils.js"></script>
<script src="/static/js/encoding.js"></script>
{% endblock %}
