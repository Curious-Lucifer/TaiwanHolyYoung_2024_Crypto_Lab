{% extends "base.html" %}

{% block head %}
<link rel="stylesheet" href="/static/style/index.css">
{% endblock %}

{% block active_get_hash_flag %}active{% endblock %}

{% block body %}
<div class="container-fluid d-flex justify-content-start gap-50 m-3 p-3">
  <div class="interactive-container width-800">
    <div class="interactive-block">
      <h2>Message</h2>
      <textarea id="hashflag-msg"></textarea>
    </div>

    <div class="switch-container">
      <img src="/static/img/switch.png" width="24">
    </div>

    <div class="interactive-block">
      <h2>Flag</h2>
      <textarea id="hashflag-flag"></textarea>
    </div>
  </div>
</div>
{% endblock %}

{% block script %}
<script src="/static/js/utils.js"></script>
<script src="/static/js/get-hash-flag.js"></script>
{% endblock %}
