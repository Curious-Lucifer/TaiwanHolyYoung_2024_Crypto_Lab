<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cut & Paste</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-F3w7mX95PdgyTmZZMECAngseQB83DfGTowi0iMjiWaeVhAn4FJkqJByhZMI3AhiU" crossorigin="anonymous">
    <link rel="stylesheet" href="/static/style/index.css">
  </head>
  <body>
    <h1 class="text-center m-5">Cut & Paste</h1>

    <div class="width-500 border border-secondary border-1 rounded-1 p-4 mx-auto">
      <form method="POST" action="/login">
        <div class="form-floating mb-3">
          <input type="text" class="form-control" id="username" name="username" placeholder="User" autocomplete="off" required>
          <label for="floatingInput">Username</label>
        </div>
        <div class="d-grid">
          <button class="btn btn-outline-secondary" type="submit">Register / Login</button>
        </div>
      </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/js/bootstrap.bundle.min.js" integrity="sha384-/bQdsTh/da6pkI1MST/rWKFNjaCP5gBSY4sEBT38Q/9RBh9AH40zEOg7Hlq2THRZ" crossorigin="anonymous"></script>
  </body>
</html>
